<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · CodeAlpha VideoChat</title>
  <meta name="description" content="Secure, high-quality multi-user video chat room, live text chat, and interactive shared whiteboard. Real-time peer-to-peer collaboration without complex setups." />
  <meta name="keywords" content="Video chat, WebRTC, Socket.io, screen sharing, collaborative whiteboard, peer-to-peer, mesh network, encrypted calls" />
  <meta name="author" content="CodeAlpha Team" />
  <meta name="robots" content="index, follow" />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sign in · CodeAlpha VideoChat" />
  <meta property="og:description" content="Host and join multi-user video calls with live collaboration tools including screen share, chat, and a shared whiteboard." />
  <meta property="og:image" content="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800&auto=format&fit=crop" />
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Sign in · CodeAlpha VideoChat" />
  <meta property="twitter:description" content="Host and join multi-user video calls with live collaboration tools including screen share, chat, and a shared whiteboard." />
  <meta property="twitter:image" content="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800&auto=format&fit=crop" />
  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CodeAlpha VideoChat",
    "description": "A real-time multi-user video chat and collaboration application featuring screen sharing, file transfer, and canvas whiteboard.",
    "applicationCategory": "CommunicationApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0.00",
      "priceCurrency": "USD"
    }
  }
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="center-wrap">
    <div class="card">
      <div class="brand">
        <div class="logo">🎥</div>
        <h1>CodeAlpha VideoChat<small>Real-time video, chat &amp; whiteboard</small></h1>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to start or join a call.</p>

      <form id="loginForm" novalidate>
        <label for="identifier">Username or email</label>
        <input id="identifier" name="identifier" type="text" autocomplete="username" placeholder="alice" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />

        <div id="alert" class="alert error"></div>

        <button class="btn" type="submit" id="submitBtn">Sign in</button>
      </form>

      <p class="switch-line">New here? <a href="/register.html">Create an account</a></p>

      <div class="demo-box">
        Demo accounts: <code>alice</code> / <code>bob</code> — password <code>password123</code>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, setSession, getToken } from '/js/api.js';

    if (getToken()) location.href = '/lobby.html';

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        const data = await api('/api/auth/login', { method: 'POST', body: { identifier, password } });
        setSession(data.token, data.user);
        location.href = '/lobby.html';
      } catch (err) {
        showError(err.message || 'Could not sign in');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
