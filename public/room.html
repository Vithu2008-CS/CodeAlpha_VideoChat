<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room · CodeAlpha VideoChat</title>
  <meta name="description" content="Collaborative secure video conferencing room with live screen sharing, synchronized drawing whiteboard, and chat file uploads." />
  <meta name="keywords" content="WebRTC video session, secure chat room, live collaborative canvas, download whiteboard, peer screen share" />
  <meta name="author" content="CodeAlpha Team" />
  <meta name="robots" content="noindex, nofollow" /> <!-- Protect private meeting rooms from indices -->
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Room · CodeAlpha VideoChat" />
  <meta property="og:description" content="Collaborative secure video conferencing room with live screen sharing, synchronized drawing whiteboard, and chat file uploads." />
  <meta property="og:image" content="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800&auto=format&fit=crop" />
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Room · CodeAlpha VideoChat" />
  <meta property="twitter:description" content="Collaborative secure video conferencing room with live screen sharing, synchronized drawing whiteboard, and chat file uploads." />
  <meta property="twitter:image" content="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800&auto=format&fit=crop" />
  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CodeAlpha VideoChat",
    "description": "A real-time multi-user video chat and collaboration application featuring screen sharing, file transfer, and canvas whiteboard.",
    "applicationCategory": "CommunicationApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0.00",
      "priceCurrency": "USD"
    }
  }
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="room-body">
  <div class="room-shell">
    <!-- ===== Stage: video grid + controls ===== -->
    <div class="stage">
      <div class="topbar">
        <div class="brand" style="margin:0;">
          <div class="logo" style="width:32px;height:32px;font-size:17px;">🎥</div>
        </div>
        <div class="room-meta">
          <strong id="roomName">Room</strong>
          <span>Share this code to invite others</span>
        </div>
        <button class="code-pill" id="codePill" title="Click to copy">------</button>
        <div class="spacer"></div>
        <span class="muted-text" id="connState">Connecting…</span>
      </div>

      <div class="video-grid" id="videoGrid">
        <!-- Local tile -->
        <div class="tile local" id="localTile" data-initial="?">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="badges">
            <div class="badge mic">🔇</div>
            <div class="badge cam">📷</div>
          </div>
          <div class="name"><span id="localName">You</span> (you)</div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl active" id="micBtn" title="Toggle microphone">🎙️</button>
        <button class="ctrl active" id="camBtn" title="Toggle camera">📷</button>
        <button class="ctrl" id="screenBtn" title="Share your screen">🖥️</button>
        <button class="ctrl leave" id="leaveBtn" title="Leave the call">📞 Leave</button>
      </div>
    </div>

    <!-- ===== Side panel ===== -->
    <aside class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="participants">Participants <span class="count" id="pCount">(1)</span></button>
        <button class="tab" data-tab="chat">Chat</button>
        <button class="tab" data-tab="whiteboard">Whiteboard</button>
      </div>

      <!-- Participants -->
      <div class="tab-body active" data-tab="participants">
        <ul class="participant-list" id="participantList"></ul>
      </div>

      <!-- Chat + files -->
      <div class="tab-body" data-tab="chat">
        <div class="chat-log" id="chatLog">
          <div class="empty" id="chatEmpty">No messages yet. Say hi 👋</div>
        </div>
        <div class="chat-input-bar">
          <button class="icon-btn" id="fileBtn" title="Share a file">📎</button>
          <input type="file" id="fileInput" hidden />
          <input type="text" id="chatInput" placeholder="Type a message…" autocomplete="off" />
          <button class="icon-btn" id="sendBtn" title="Send">➤</button>
        </div>
      </div>

      <!-- Whiteboard -->
      <div class="tab-body" data-tab="whiteboard">
        <div class="wb-toolbar">
          <button class="wb-tool active" id="wbPen" title="Pen">✏️</button>
          <button class="wb-tool" id="wbEraser" title="Eraser">🧽</button>
          
          <!-- Quick Color Palette Swatches -->
          <div class="wb-swatches">
            <div class="wb-swatch active" data-color="#1e1b4b" style="background:#1e1b4b;"></div>
            <div class="wb-swatch" data-color="#ef4444" style="background:#ef4444;"></div>
            <div class="wb-swatch" data-color="#10b981" style="background:#10b981;"></div>
            <div class="wb-swatch" data-color="#3b82f6" style="background:#3b82f6;"></div>
            <div class="wb-swatch" data-color="#f59e0b" style="background:#f59e0b;"></div>
            <div class="wb-swatch" data-color="#ffffff" style="background:#ffffff; border:1px solid #ccc;"></div>
          </div>
          
          <input type="color" id="wbColor" value="#1e1b4b" title="Custom Colour" style="width:28px;height:28px;border-radius:50%;padding:0;border:none;cursor:pointer;" />
          <input type="range" id="wbSize" min="1" max="40" value="4" title="Brush size" style="width:60px;" />
          
          <!-- Download Board Button -->
          <button class="wb-tool" id="wbDownload" title="Download Board PNG" style="width:auto;padding:0 8px;">💾</button>
          <button class="wb-tool" id="wbClear" title="Clear board" style="margin-left:auto;width:auto;padding:0 8px;">Clear</button>
        </div>
        <div class="wb-canvas-wrap">
          <canvas id="whiteboard"></canvas>
        </div>
      </div>
    </aside>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <!-- Socket.io client loaded from CDN (prevents 404 in serverless environments) -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script type="module" src="/js/room.js"></script>
</body>
</html>
